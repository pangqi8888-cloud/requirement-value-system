services:
  # Backend API Service
  - type: web
    name: requirement-value-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: singapore
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./requirements.db
      - key: SECRET_KEY
        generateValue: true
      - key: QWEN_API_KEY
        sync: false
    healthCheckPath: /health

  # Frontend Static Site
  - type: web
    name: requirement-value-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    plan: free
    region: singapore
    envVars:
      - key: VITE_API_URL
        value: https://requirement-value-backend.onrender.com/api/v1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
